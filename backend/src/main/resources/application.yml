server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: exhibition-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/exhibition_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minio123456
  bucket: exhibition

face:
  match:
    threshold: 0.82
  detect:
    interval: 500

display:
  max-items: 50

sa-token:
  token-name: Authorization
  timeout: 2592000          # 30天
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

logging:
  level:
    com.school.exhibition: debug
  file:
    path: ./logs