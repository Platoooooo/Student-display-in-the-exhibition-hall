server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: exhibition-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:exhibition_db}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 项目暂未使用逻辑删除（表无 deleted 列），保留默认即可，避免 MP 隐式注入 WHERE deleted = 0

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minio123456}
  bucket: ${MINIO_BUCKET:exhibition}

face:
  match:
    threshold: ${FACE_THRESHOLD:0.82}
  detect:
    interval: 500

display:
  max-items: 50

sa-token:
  token-name: Authorization
  timeout: 2592000          # 30天
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

logging:
  level:
    com.school.exhibition: ${LOG_LEVEL:debug}
  file:
    path: ./logs
