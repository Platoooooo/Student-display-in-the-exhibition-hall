<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>校友成果填报</title>
  <style>

    p { color: #646566; font-size: 14px; margin-bottom: 8px; line-height: 1.6; }
    code { background: #f2f3f5; padding: 2px 8px; border-radius: 4px; font-size: 13px; color: #1989fa; }
    .tip { margin-top: 16px; padding: 12px; background: #e8f4ff; border-radius: 8px; color: #1989fa; font-size: 13px; }

</head>
<body>
  <div class="card">
    <h1>&#x1F4DD; 校友成果填报</h1>

    <p>请在 <code>student-h5/</code> 下执行 <code>npm run build</code>，<br>然后将 <code>dist/</code> 内容复制到此目录。</p>

  </div>

</html>
