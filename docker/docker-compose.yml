version: '3.8'

services:
  # ============= MySQL =============
  mysql:
    image: mysql:8.0
    container_name: exhibition-mysql
    restart: always
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-exhibition_db}
      TZ: Asia/Shanghai
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=64M
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - exhibition-net

  # ============= Redis =============
  redis:
    image: redis:7-alpine
    container_name: exhibition-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456} --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exhibition-net

  # ============= MinIO =============
  minio:
    image: minio/minio:latest
    container_name: exhibition-minio
    restart: always
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # 控制台
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123456}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exhibition-net

  # ============= 后端服务 =============
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: exhibition-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-exhibition_db}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123456}
      MINIO_BUCKET: ${MINIO_BUCKET:-exhibition}
      FACE_THRESHOLD: ${FACE_THRESHOLD:-0.82}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: Asia/Shanghai
    volumes:
      - ./logs:/app/logs
    networks:
      - exhibition-net

  # ============= Nginx（管理后台 + H5 静态托管 + 反代） =============
  nginx:
    image: nginx:alpine
    container_name: exhibition-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html/admin:/usr/share/nginx/html/admin:ro
      - ./nginx/html/student:/usr/share/nginx/html/student:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - exhibition-net

networks:
  exhibition-net:
    driver: bridge
